---
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: mpiercy-nccl-36n-cd
spec:
  numNodes: 0
  channel:
    resourceClaimTemplate:
      name: mpiercy-nccl-36n-cd-channel

---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: nccl-36n
  annotations:
    # Adjust NetworkAttachmentDefinition names to match your cluster (kubectl get net-attach-def)
    k8s.v1.cni.cncf.io/networks: ipoib-rdma-shared-device-default-a-su-1,ipoib-rdma-shared-device-default-b-su-1,ipoib-rdma-shared-device-default-c-su-1,ipoib-rdma-shared-device-default-d-su-1
spec:
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  replicatedJobs:
  - name: w
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completionMode: Indexed
        completions: 36
        parallelism: 36
        template:
          metadata:
            annotations:
              # Must match the JobSet-level annotation above
              k8s.v1.cni.cncf.io/networks: ipoib-rdma-shared-device-default-a-su-1,ipoib-rdma-shared-device-default-b-su-1,ipoib-rdma-shared-device-default-c-su-1,ipoib-rdma-shared-device-default-d-su-1
          spec:
            nodeSelector:
              nvidia.com/gpu.present: "true"
              feature.node.kubernetes.io/rdma.capable: "true"
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: nvidia.com/gpu.clique
                      operator: In
                      values:
                      # Replace with your clique IDs (run: kubectl get nodes -L nvidia.com/gpu.clique)
                      - "<RACK_A_CLIQUE_ID>"
                      - "<RACK_B_CLIQUE_ID>"
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: nvidia.com/gpu.clique
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    jobset.sigs.k8s.io/jobset-name: nccl-36n
            containers:
            - name: nccl-test
              image: nvcr.io/nvidia/pytorch:26.02-py3
              securityContext:
                capabilities:
                  add: ["IPC_LOCK"]
              env:
              - name: NCCL_DEBUG
                value: "INFO"
              - name: OMPI_ALLOW_RUN_AS_ROOT
                value: "1"
              - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                value: "1"
              command: ["/bin/bash", "-c"]
              args:
              - |
                set -ex

                N_NODES=36
                GPUS_PER_NODE=4
                SSHD_PORT=2222
                MAX_RETRIES=600
                SSH_RETRIES=24
                SSH_SLEEP=5

                # Install openssh-server
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq && apt-get install -y -qq openssh-server > /dev/null

                # Set up SSH from the shared secret
                mkdir -p /root/.ssh
                cp /ssh-keys/id_ed25519 /root/.ssh/
                cp /ssh-keys/id_ed25519.pub /root/.ssh/
                cp /ssh-keys/authorized_keys /root/.ssh/
                chmod 700 /root/.ssh
                chmod 600 /root/.ssh/id_ed25519 /root/.ssh/authorized_keys
                cat > /root/.ssh/config <<EOF
                Host *
                  Port ${SSHD_PORT}
                  StrictHostKeyChecking no
                  UserKnownHostsFile /dev/null
                  IdentityFile /root/.ssh/id_ed25519
                EOF
                chmod 600 /root/.ssh/config

                # Start sshd
                mkdir -p /run/sshd
                ssh-keygen -A
                /usr/sbin/sshd -p ${SSHD_PORT} -o "PidFile=/tmp/sshd.pid"

                # Build hostfile and wait for all nodes.
                # Resolve worker IPs from the JobSet headless service.
                SERVICE_NAME="nccl-36n"
                NODE_RANK=${JOB_COMPLETION_INDEX}
                : > /tmp/hostfile

                tries=0
                while true; do
                  PEERS=$(getent ahostsv4 "${SERVICE_NAME}" | awk '{print $1}' | sort -u)
                  PEER_COUNT=$(printf '%s\n' "${PEERS}" | sed '/^$/d' | wc -l)
                  if [ "${PEER_COUNT}" -ge "${N_NODES}" ]; then
                    break
                  fi
                  tries=$((tries + 1))
                  if [ "${tries}" -ge "${MAX_RETRIES}" ]; then
                    echo "ERROR: only found ${PEER_COUNT}/${N_NODES} peers via service ${SERVICE_NAME}"
                    exit 1
                  fi
                  echo "Waiting for peers via ${SERVICE_NAME}: ${PEER_COUNT}/${N_NODES}"
                  sleep 5
                done

                printf '%s\n' "${PEERS}" | sed '/^$/d' | head -n "${N_NODES}" | while read -r PEER; do
                  ssh_tries=0
                  until ssh -n -p ${SSHD_PORT} -o ConnectTimeout=2 ${PEER} hostname >/dev/null 2>&1; do
                    ssh_tries=$((ssh_tries + 1))
                    if [ "${ssh_tries}" -ge "${SSH_RETRIES}" ]; then
                      echo "ERROR: ssh not ready on ${PEER}:${SSHD_PORT} after ${SSH_RETRIES} retries"
                      exit 1
                    fi
                    echo "Waiting for ssh on ${PEER}:${SSHD_PORT} (${ssh_tries}/${SSH_RETRIES})"
                    sleep ${SSH_SLEEP}
                  done
                  echo "${PEER} slots=${GPUS_PER_NODE}" >> /tmp/hostfile
                done

                echo "=== Hostfile ==="
                cat /tmp/hostfile
                HOSTFILE_LINES=$(wc -l < /tmp/hostfile)
                HOSTFILE_UNIQUE=$(awk '{print $1}' /tmp/hostfile | sort -u | wc -l)
                HOSTFILE_SLOTS=$(awk '{for(i=1;i<=NF;i++) if($i ~ /^slots=/){split($i,a,"="); s+=a[2]}} END{print s+0}' /tmp/hostfile)
                EXPECTED_SLOTS=$((N_NODES * GPUS_PER_NODE))
                echo "Hostfile stats: lines=${HOSTFILE_LINES} unique_hosts=${HOSTFILE_UNIQUE} slots=${HOSTFILE_SLOTS} expected_slots=${EXPECTED_SLOTS}"

                echo "Host: $(hostname)"
                nvidia-smi -L

                # Launcher (rank 0) runs mpirun; workers just wait
                if [ "${NODE_RANK}" = "0" ]; then
                  if [ "${HOSTFILE_SLOTS}" -lt "${EXPECTED_SLOTS}" ]; then
                    echo "ERROR: insufficient slots in /tmp/hostfile (${HOSTFILE_SLOTS}/${EXPECTED_SLOTS})"
                    exit 1
                  fi
                  echo "--- LAUNCHER: running all_reduce_perf_mpi ---"

                  mpirun \
                    --allow-run-as-root \
                    -np $((N_NODES * GPUS_PER_NODE)) \
                    --hostfile /tmp/hostfile \
                    -bind-to none \
                    -map-by slot \
                    --mca orte_keep_fqdn_hostnames 1 \
                    --mca btl self,tcp \
                    --mca btl_tcp_if_include eth0 \
                    --mca plm_rsh_agent "ssh -q -o StrictHostKeyChecking=no -p ${SSHD_PORT}" \
                    -x NCCL_DEBUG \
                    -x NCCL_DEBUG_SUBSYS \
                    -x NCCL_NVLS_ENABLE \
                    -x NCCL_NET \
                    -x LD_LIBRARY_PATH \
                    -x PATH \
                    all_reduce_perf_mpi \
                    -b 128M -e 32G -f 2 -c 0 -n 200

                  echo "--- LAUNCHER: test complete ---"
                else
                  echo "--- WORKER: sshd running on port ${SSHD_PORT}, waiting for work ---"
                  sleep infinity
                fi
              resources:
                requests:
                  nvidia.com/gpu: '4'
                  rdma/rdma_shared_device_a: '1'
                  rdma/rdma_shared_device_b: '1'
                  rdma/rdma_shared_device_c: '1'
                  rdma/rdma_shared_device_d: '1'
                limits:
                  nvidia.com/gpu: '4'
                  rdma/rdma_shared_device_a: '1'
                  rdma/rdma_shared_device_b: '1'
                  rdma/rdma_shared_device_c: '1'
                  rdma/rdma_shared_device_d: '1'
                claims:
                - name: compute-domain-channel
              volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: ssh-keys
                mountPath: /ssh-keys
                readOnly: true
            resourceClaims:
            - name: compute-domain-channel
              resourceClaimTemplateName: mpiercy-nccl-36n-cd-channel
            volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
            - name: ssh-keys
              secret:
                secretName: nccl-ssh-keys
                defaultMode: 0600
  successPolicy:
    operator: All
