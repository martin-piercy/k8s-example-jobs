              - name: MASTER_PORT
                value: "6002"
              - name: NNODES
                value: "32"
              - name: GPUS_PER_NODE
                value: "4"
              - name: NEMO_LAUNCH_SCRIPT
                value: /workload/configs/nemotron4-340b-fp8.py
              - name: FIXED_GBS
                value: "128"
              - name: EXPLICIT_LOG_DIR
                value: workload_logs
              - name: ARTIFACT_DIR
                value: /tmp/artifacts
              - name: CUDA_DEVICE_ORDER
                value: PCI_BUS_ID
              - name: NCCL_DEBUG
                value: INFO
              - name: NCCL_IB_HCA
                value: "mlx5_0,mlx5_1,mlx5_4,mlx5_5"
              - name: GLOO_SOCKET_IFNAME
                value: eth0
